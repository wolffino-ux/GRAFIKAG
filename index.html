<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafik</title>

<style>
body {
    font-family: -apple-system;
    background: #0f0f0f;
    color: white;
    margin: 0;
    padding: 10px;
}

h1 {
    text-align: center;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
}

.day {
    background: #1c1c1e;
    border-radius: 12px;
    padding: 4px;
    height: 140px;
    position: relative;
}

.date {
    font-size: 12px;
    margin-bottom: 2px;
}

.timeline {
    position: relative;
    height: 100px;
    background: #2c2c2e;
    border-radius: 8px;
}

.block {
    position: absolute;
    left: 2px;
    right: 2px;
    border-radius: 6px;
    font-size: 9px;
    padding: 2px;
    overflow: hidden;
white-space: pre-line;
font-size: 9px;
line-height: 1.1;
}



.strusia { background: #2ecc71; }
.medicover { background: #3498db; }
.samolotowa { background: #9b59b6; }
.custom { background: #f39c12; }
.vacation { background: #e74c3c; }

button {
    width: 100%;
    margin-top: 3px;
    border: none;
    border-radius: 6px;
    font-size: 10px;
}

.header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
    text-align: center;
    font-size: 12px;
    opacity: 0.8;
}

.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.nav button {
    width: 40px;
    font-size: 18px;
}

#monthLabel {
    font-size: 16px;
    font-weight: bold;
}

</style>
</head>

<body>

<h1>📅 Grafik</h1>

<div class="nav">
    <button onclick="changeMonth(-1)">◀</button>
    <div id="monthLabel"></div>
    <button onclick="changeMonth(1)">▶</button>
</div>
<div class="header">
    <div>Pon</div>
    <div>Wt</div>
    <div>Śr</div>
    <div>Cz</div>
    <div>Pt</div>
    <div>Sb</div>
    <div>Nd</div>
</div>

<div id="calendar" class="calendar"></div>

<script>
const calendar = document.getElementById("calendar");
let saved = {};
try {
    saved = JSON.parse(localStorage.getItem("events") || "{}");
} catch (e) {
    saved = {};
}
let currentDate = new Date();

function timeToTop(hour, minute) {
    const total = (hour + minute/60) - 8;
    return (total / 12) * 100;
}

function getWork(day) {
    switch(day) {
        case 0: return [[8,0,12,0,"strusia","Strusia"]];
        case 1: return [
            [8,0,12,0,"strusia","Strusia"],
            [15,0,19,0,"medicover","Medicover"]
        ];
        case 2:
        case 3:
            return [[8,15,14,0,"samolotowa","Samolotowa"]];
        case 4:
            return [[8,0,13,0,"medicover","Medicover"]];
        default:
            return [];
    }
}

function getDayIndex(date) {
    let d = date.getDay();
    return d === 0 ? 6 : d - 1;
}

function renderCalendar() {
    calendar.innerHTML = "";

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

   const label = document.getElementById("monthLabel");
if (label) {
    label.innerText =
        currentDate.toLocaleString("pl-PL", { month: "long", year: "numeric" });
}

    const daysInMonth = new Date(year, month + 1, 0).getDate();

const firstDay = new Date(year, month, 1);
const startIndex = getDayIndex(firstDay);

// puste dni przed początkiem miesiąca
for (let i = 0; i < startIndex; i++) {
    const empty = document.createElement("div");
    calendar.appendChild(empty);
}

    for (let i = 1; i <= daysInMonth; i++) {
        const date = new Date(year, month, i);
        const dayIndex = getDayIndex(date);

        const cell = document.createElement("div");
        cell.className = "day";

        const dateEl = document.createElement("div");
        dateEl.className = "date";
        dateEl.innerText = i;

        const timeline = document.createElement("div");
        timeline.className = "timeline";

        const work = getWork(dayIndex);
        work.forEach(w => {
            const [h1,m1,h2,m2,cls,name] = w;

            const block = document.createElement("div");
            block.className = "block " + cls;

            const top = timeToTop(h1,m1);
            const bottom = timeToTop(h2,m2);

            block.style.top = top + "%";
            block.style.height = (bottom - top) + "%";

            block.innerText =
                `${h1.toString().padStart(2,'0')}:${m1.toString().padStart(2,'0')}–${h2.toString().padStart(2,'0')}:${m2.toString().padStart(2,'0')}\n${name}`;

            timeline.appendChild(block);
        });

        if (saved[i]) {
            saved[i].forEach(ev => {
                const block = document.createElement("div");
                block.className = "block " + ev.type;

                const top = timeToTop(ev.startH, ev.startM);
                const bottom = timeToTop(ev.endH, ev.endM);

                block.style.top = top + "%";
                block.style.height = (bottom - top) + "%";

                block.innerText =
                    `${ev.startH.toString().padStart(2,'0')}:${ev.startM.toString().padStart(2,'0')}–${ev.endH.toString().padStart(2,'0')}:${ev.endM.toString().padStart(2,'0')}\n${ev.text}`;

                timeline.appendChild(block);
            });
        }

        const btn = document.createElement("button");
        btn.innerText = "+";
        btn.onclick = () => {
            let text = prompt("Co?");
            let start = prompt("Od (np 16:00)");
            let end = prompt("Do (np 18:00)");
            let type = prompt("Typ: custom / vacation");

            if (!text || !start || !end) return;

            let [sh, sm] = start.split(":").map(Number);
            let [eh, em] = end.split(":").map(Number);

            if (!saved[i]) saved[i] = [];
            saved[i].push({text, startH:sh, startM:sm, endH:eh, endM:em, type});

            localStorage.setItem("events", JSON.stringify(saved));
            renderCalendar();
        };

        cell.appendChild(dateEl);
        cell.appendChild(timeline);
        cell.appendChild(btn);

        calendar.appendChild(cell);
    }
}

function changeMonth(offset) {
    currentDate.setMonth(currentDate.getMonth() + offset);
    renderCalendar();
}

renderCalendar();
</script>
</body>
</html>
