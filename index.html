<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafik</title>

<style>
body {
    font-family: -apple-system;
    background: #0f0f0f;
    color: white;
    margin: 0;
    padding: 10px;
}

h1 {
    text-align: center;
}

.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.nav button {
    width: 40px;
    font-size: 18px;
}

#monthLabel {
    font-size: 16px;
    font-weight: bold;
}

.header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    margin-bottom: 6px;
    font-size: 12px;
    opacity: 0.8;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
}

.day {
    background: #1c1c1e;
    border-radius: 12px;
    padding: 4px;
    height: 140px;
}

.date {
    font-size: 12px;
}

.timeline {
    position: relative;
    height: 100px;
    background: #2c2c2e;
    border-radius: 8px;
    margin-top: 2px;
}

.block {
    position: absolute;
    left: 2px;
    right: 2px;
    border-radius: 6px;
    font-size: 9px;
    padding: 2px;
    white-space: pre-line;
    line-height: 1.1;
}
    .holiday {
    background: #ff3b30;
    font-size: 10px;
    margin-top: 2px;
    padding: 2px;
    border-radius: 4px;
}

.strusia { background: #2ecc71; }
.medicover { background: #3498db; }
.samolotowa { background: #9b59b6; }
.custom { background: #f39c12; }
.vacation { background: #e74c3c; }

button {
    width: 100%;
    margin-top: 3px;
    border: none;
    border-radius: 6px;
    font-size: 10px;
}
</style>
</head>

<body>

<h1>📅 Grafik</h1>

<div class="nav">
    <button onclick="changeMonth(-1)">◀</button>
    <div id="monthLabel"></div>
    <button onclick="changeMonth(1)">▶</button>
</div>

<div class="header">
    <div>Pon</div><div>Wt</div><div>Śr</div>
    <div>Cz</div><div>Pt</div><div>Sb</div><div>Nd</div>
</div>

<div id="calendar" class="calendar"></div>

<script>
const calendar = document.getElementById("calendar");
    const holidays = {
    "01-01": "Nowy Rok",
    "01-06": "Trzech Króli",
    "05-01": "Święto Pracy",
    "05-03": "Święto Konstytucji",
    "08-15": "Wniebowzięcie",
    "11-01": "Wszystkich Świętych",
    "11-11": "Niepodległość",
    "12-25": "Boże Narodzenie",
    "12-26": "Boże Narodzenie"
};

let saved = {};
try {
    saved = JSON.parse(localStorage.getItem("events") || "{}");
} catch(e) {
    saved = {};
}

let currentDate = new Date();

function timeToTop(hour, minute) {
    return ((hour + minute/60 - 8) / 12) * 100;
}

function getWork(day) {
    switch(day) {
        case 0: return [[8,0,12,0,"strusia","Strusia"]];
        case 1: return [
            [8,0,12,0,"strusia","Strusia"],
            [15,0,19,0,"medicover","Medicover"]
        ];
        case 2:
        case 3: return [[8,15,14,0,"samolotowa","Samolotowa"]];
        case 4: return [[8,0,13,0,"medicover","Medicover"]];
        default: return [];
    }
}

function getDayIndex(date) {
    let d = date.getDay();
    return d === 0 ? 6 : d - 1;
}

function renderCalendar() {
    calendar.innerHTML = "";

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const label = document.getElementById("monthLabel");
    if (label) {
        label.innerText = currentDate.toLocaleString("pl-PL", {
            month: "long",
            year: "numeric"
        });
    }

    const daysInMonth = new Date(year, month + 1, 0).getDate();

    const firstDay = new Date(year, month, 1);
    const startIndex = getDayIndex(firstDay);

    // puste pola
    for (let i = 0; i < startIndex; i++) {
        calendar.appendChild(document.createElement("div"));
    }

    for (let i = 1; i <= daysInMonth; i++) {
        const date = new Date(year, month, i);
        const dayIndex = getDayIndex(date);
const key = String(month+1).padStart(2,'0') + "-" + String(i).padStart(2,'0');

if (holidays[key]) {
    const el = document.createElement("div");
    el.className = "event vacation";
    el.innerText = holidays[key];
    cell.appendChild(el);
}
        const cell = document.createElement("div");
        cell.className = "day";

        const dateEl = document.createElement("div");
        dateEl.className = "date";
        dateEl.innerText = i;

        const timeline = document.createElement("div");
        timeline.className = "timeline";

        const work = getWork(dayIndex);
        work.forEach(w => {
            const [h1,m1,h2,m2,cls,name] = w;

            const block = document.createElement("div");
            block.className = "block " + cls;

            const top = timeToTop(h1,m1);
            const bottom = timeToTop(h2,m2);

            block.style.top = top + "%";
            block.style.height = (bottom - top) + "%";

            block.innerText =
                `${h1.toString().padStart(2,'0')}:${m1.toString().padStart(2,'0')}–${h2.toString().padStart(2,'0')}:${m2.toString().padStart(2,'0')}\n${name}`;

            timeline.appendChild(block);
        });

        if (saved[i]) {
            saved[i].forEach(ev => {
                const block = document.createElement("div");
                block.className = "block " + ev.type;

                const top = timeToTop(ev.startH, ev.startM);
                const bottom = timeToTop(ev.endH, ev.endM);

                block.style.top = top + "%";
                block.style.height = (bottom - top) + "%";

                block.innerText =
                    `${ev.startH}:${ev.startM}–${ev.endH}:${ev.endM}\n${ev.text}`;

                timeline.appendChild(block);
            });
        }

        const btn = document.createElement("button");
        btn.innerText = "+";
        btn.onclick = function() {
            const text = prompt("Co?");
            const start = prompt("Od (np 16:00)");
            const end = prompt("Do (np 18:00)");
            const type = prompt("Typ: custom / vacation / allday");
            if (type === "allday") {
    sh = 8; sm = 0;
    eh = 20; em = 0;
}

            if (!text || !start || !end) return;

            const sh = parseInt(start.split(":")[0]);
            const sm = parseInt(start.split(":")[1]);
            const eh = parseInt(end.split(":")[0]);
            const em = parseInt(end.split(":")[1]);

            if (!saved[i]) saved[i] = [];
            saved[i].push({text, startH:sh, startM:sm, endH:eh, endM:em, type});

            localStorage.setItem("events", JSON.stringify(saved));
            renderCalendar();
        };

        cell.appendChild(dateEl);
        cell.appendChild(timeline);
        cell.appendChild(btn);

        calendar.appendChild(cell);
    }
}

function changeMonth(offset) {
    currentDate.setMonth(currentDate.getMonth() + offset);
    renderCalendar();
}

renderCalendar();
</script>

</body>
</html>
